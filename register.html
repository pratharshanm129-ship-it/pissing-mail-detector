{% extends "base.html" %}
{% block title %}Register - PhishGuard{% endblock %}

{% block content %}
<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-5">
            <div class="card shadow-sm auth-card">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <i class="bi bi-person-plus-fill display-5 text-primary"></i>
                        <h3 class="fw-bold mt-2">Create an Account</h3>
                        <p class="text-muted">Join PhishGuard to start detecting phishing emails</p>
                    </div>

                    <form method="POST" action="{{ url_for('main.register') }}" novalidate>
                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold">Username</label>
                            <input type="text" class="form-control" id="username" name="username"
                                   value="{{ username }}" minlength="3" required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">Email Address</label>
                            <input type="email" class="form-control" id="email" name="email"
                                   value="{{ email }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label fw-semibold">Password</label>
                            <input type="password" class="form-control" id="password" name="password"
                                   minlength="6" required>
                            <div class="form-text">Must be at least 6 characters long.</div>
                        </div>

                        <div class="mb-3">
                            <label for="confirm_password" class="form-label fw-semibold">Confirm Password</label>
                            <input type="password" class="form-control" id="confirm_password"
                                   name="confirm_password" minlength="6" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 fw-semibold py-2">
                            <i class="bi bi-check-circle me-1"></i> Register
                        </button>
                    </form>

                    <p class="text-center mt-3 mb-0">
                        Already have an account?
                        <a href="{{ url_for('main.login') }}" class="fw-semibold">Login here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
